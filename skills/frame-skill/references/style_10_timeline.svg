<?xml version="1.0" encoding="UTF-8"?>
<!--
  STYLE 10 · TIMELINE / PHASED ROADMAP
  Pattern: one horizontal spine, milestone nodes pinned along it, content cards
           alternate above and below the spine, optional duration bands.
  Use for: research roadmaps, project phases, training-progression timelines,
           "what happened when", staged method development.
  Palette: Pastel Academic. Font: Times New Roman + CJK.

  Coordinate system: 1600 x 750 viewBox.
  Spine: horizontal line at y=375, from x=120 to x=1480.
  Milestones: 5 nodes evenly spaced at x = 240, 540, 840, 1140, 1440.
  Cards: 240 wide, 150 tall. Odd milestones (1,3,5) above the spine,
         even milestones (2,4) below. Connector stub links card to node.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 750"
     font-family="'Noto Sans CJK SC', 'SimHei', 'Times New Roman', serif">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6B7280"/>
    </marker>
  </defs>

  <text x="800" y="52" text-anchor="middle" font-size="26" font-weight="bold" fill="#1F2937">
    研究路线图 Research Roadmap
  </text>
  <text x="800" y="80" text-anchor="middle" font-size="14" fill="#6B7280" font-style="italic">
    five phases from problem framing to deployment · ~14 months
  </text>

  <!-- ===== SPINE ===== -->
  <line x1="120" y1="375" x2="1478" y2="375" stroke="#6B7280" stroke-width="3"
        marker-end="url(#arrow)"/>
  <text x="120" y="408" font-size="12" fill="#9CA3AF" font-style="italic">start</text>
  <text x="1478" y="408" text-anchor="end" font-size="12" fill="#9CA3AF" font-style="italic">time →</text>

  <!-- duration band beneath the spine (light, shows the months) -->
  <rect x="120" y="345" width="1358" height="0" />

  <!-- ===== MILESTONE 1 (above) ===== -->
  <line x1="240" y1="375" x2="240" y2="290" stroke="#7BA7D9" stroke-width="2"/>
  <circle cx="240" cy="375" r="13" fill="#7BA7D9" stroke="#FFFFFF" stroke-width="3"/>
  <g>
    <rect x="120" y="140" width="240" height="150" rx="12"
          fill="#DCE7F5" stroke="#7BA7D9" stroke-width="2.5"/>
    <rect x="120" y="140" width="240" height="34" rx="12" fill="#7BA7D9"/>
    <rect x="120" y="158" width="240" height="16" fill="#7BA7D9"/>
    <text x="240" y="163" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">
      阶段 1 · M1–M2
    </text>
    <text x="240" y="202" text-anchor="middle" font-size="15" font-weight="bold" fill="#1F2937">问题定义</text>
    <text x="240" y="228" text-anchor="middle" font-size="12" fill="#4B5563">Problem framing</text>
    <text x="240" y="252" text-anchor="middle" font-size="11" fill="#6B7280">literature review</text>
    <text x="240" y="270" text-anchor="middle" font-size="11" fill="#6B7280">scope &amp; metrics fixed</text>
  </g>

  <!-- ===== MILESTONE 2 (below) ===== -->
  <line x1="540" y1="375" x2="540" y2="460" stroke="#88C088" stroke-width="2"/>
  <circle cx="540" cy="375" r="13" fill="#88C088" stroke="#FFFFFF" stroke-width="3"/>
  <g>
    <rect x="420" y="460" width="240" height="150" rx="12"
          fill="#D6EBD6" stroke="#88C088" stroke-width="2.5"/>
    <rect x="420" y="576" width="240" height="34" rx="12" fill="#88C088"/>
    <rect x="420" y="576" width="240" height="16" fill="#88C088"/>
    <text x="540" y="598" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">
      阶段 2 · M3–M5
    </text>
    <text x="540" y="498" text-anchor="middle" font-size="15" font-weight="bold" fill="#1F2937">数据构建</text>
    <text x="540" y="524" text-anchor="middle" font-size="12" fill="#4B5563">Dataset construction</text>
    <text x="540" y="548" text-anchor="middle" font-size="11" fill="#6B7280">collection + cleaning</text>
    <text x="540" y="566" text-anchor="middle" font-size="11" fill="#6B7280">N = 1,200, expert-labelled</text>
  </g>

  <!-- ===== MILESTONE 3 (above) ===== -->
  <line x1="840" y1="375" x2="840" y2="290" stroke="#F0A776" stroke-width="2"/>
  <circle cx="840" cy="375" r="13" fill="#F0A776" stroke="#FFFFFF" stroke-width="3"/>
  <g>
    <rect x="720" y="140" width="240" height="150" rx="12"
          fill="#FFE0CC" stroke="#F0A776" stroke-width="2.5"/>
    <rect x="720" y="140" width="240" height="34" rx="12" fill="#F0A776"/>
    <rect x="720" y="158" width="240" height="16" fill="#F0A776"/>
    <text x="840" y="163" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">
      阶段 3 · M6–M9
    </text>
    <text x="840" y="202" text-anchor="middle" font-size="15" font-weight="bold" fill="#1F2937">模型开发</text>
    <text x="840" y="228" text-anchor="middle" font-size="12" fill="#4B5563">Model development</text>
    <text x="840" y="252" text-anchor="middle" font-size="11" fill="#6B7280">architecture iteration</text>
    <text x="840" y="270" text-anchor="middle" font-size="11" fill="#6B7280">ablation studies</text>
  </g>

  <!-- ===== MILESTONE 4 (below) ===== -->
  <line x1="1140" y1="375" x2="1140" y2="460" stroke="#E89090" stroke-width="2"/>
  <circle cx="1140" cy="375" r="13" fill="#E89090" stroke="#FFFFFF" stroke-width="3"/>
  <g>
    <rect x="1020" y="460" width="240" height="150" rx="12"
          fill="#FAD6D6" stroke="#E89090" stroke-width="2.5"/>
    <rect x="1020" y="576" width="240" height="34" rx="12" fill="#E89090"/>
    <rect x="1020" y="576" width="240" height="16" fill="#E89090"/>
    <text x="1140" y="598" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">
      阶段 4 · M10–M12
    </text>
    <text x="1140" y="498" text-anchor="middle" font-size="15" font-weight="bold" fill="#1F2937">验证评估</text>
    <text x="1140" y="524" text-anchor="middle" font-size="12" fill="#4B5563">Validation</text>
    <text x="1140" y="548" text-anchor="middle" font-size="11" fill="#6B7280">held-out benchmarks</text>
    <text x="1140" y="566" text-anchor="middle" font-size="11" fill="#6B7280">+13.2% over baseline</text>
  </g>

  <!-- ===== MILESTONE 5 (above) ===== -->
  <line x1="1440" y1="375" x2="1440" y2="290" stroke="#B197D6" stroke-width="2"/>
  <circle cx="1440" cy="375" r="13" fill="#B197D6" stroke="#FFFFFF" stroke-width="3"/>
  <g>
    <rect x="1320" y="140" width="240" height="150" rx="12"
          fill="#E5D9F2" stroke="#B197D6" stroke-width="2.5"/>
    <rect x="1320" y="140" width="240" height="34" rx="12" fill="#B197D6"/>
    <rect x="1320" y="158" width="240" height="16" fill="#B197D6"/>
    <text x="1440" y="163" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">
      阶段 5 · M13–M14
    </text>
    <text x="1440" y="202" text-anchor="middle" font-size="15" font-weight="bold" fill="#1F2937">部署发布</text>
    <text x="1440" y="228" text-anchor="middle" font-size="12" fill="#4B5563">Deployment</text>
    <text x="1440" y="252" text-anchor="middle" font-size="11" fill="#6B7280">inference API · paper</text>
    <text x="1440" y="270" text-anchor="middle" font-size="11" fill="#6B7280">open-source release</text>
  </g>

  <!-- ===== Milestone date labels on the spine ===== -->
  <g font-size="12" fill="#6B7280">
    <text x="240" y="350" text-anchor="middle">M2</text>
    <text x="540" y="350" text-anchor="middle">M5</text>
    <text x="840" y="350" text-anchor="middle">M9</text>
    <text x="1140" y="350" text-anchor="middle">M12</text>
    <text x="1440" y="350" text-anchor="middle">M14</text>
  </g>

  <!-- ===== Legend / footnote ===== -->
  <text x="800" y="680" text-anchor="middle" font-size="13" fill="#6B7280" font-style="italic">
    实心节点 = 关键里程碑 milestone · 卡片上下交错以避免重叠 cards alternate above/below the spine
  </text>
</svg>
