<?xml version="1.0" encoding="UTF-8"?>
<!--
  STYLE 06 · DUAL TRACK
  Pattern: two parallel horizontal flows with cross-connections at key points.
  Use for: encoder/decoder, baseline vs. proposed, train vs. inference, model A vs. model B comparisons.
  Palette: Pastel Academic. Font: Times New Roman + CJK.

  Coordinate system: 1600 x 800 viewBox.
  Top track and bottom track use different palette families so the comparison reads at a glance.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 800"
     font-family="'Times New Roman', 'Noto Sans CJK SC', 'SimHei', serif">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6B7280"/>
    </marker>
    <marker id="arrow_cross" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <text x="800" y="50" text-anchor="middle" font-size="26" font-weight="bold" fill="#1F2937">
    Baseline vs. Proposed Method
  </text>

  <!-- ===== TOP TRACK BAND (Baseline) ===== -->
  <rect x="60" y="110" width="1480" height="240" rx="14"
        fill="#DCE7F5" stroke="#7BA7D9" stroke-width="2"/>
  <text x="90" y="142" font-size="18" font-weight="bold" fill="#1F2937">
    Baseline Pipeline
  </text>
  <text x="90" y="163" font-size="12" fill="#6B7280" font-style="italic">
    standard CNN, no auxiliary supervision
  </text>

  <!-- top track modules -->
  <g>
    <rect x="130" y="195" width="180" height="110" rx="8" fill="#7BA7D9"/>
    <text x="220" y="240" text-anchor="middle" font-size="15" font-weight="600" fill="#FFFFFF">Input</text>
    <text x="220" y="262" text-anchor="middle" font-size="12" fill="#FFFFFF">64 × 64 grayscale</text>
    <text x="220" y="282" text-anchor="middle" font-size="12" fill="#FFFFFF">N = 1,000 samples</text>
  </g>
  <g>
    <rect x="400" y="195" width="180" height="110" rx="8" fill="#7BA7D9"/>
    <text x="490" y="240" text-anchor="middle" font-size="15" font-weight="600" fill="#FFFFFF">CNN backbone</text>
    <text x="490" y="262" text-anchor="middle" font-size="12" fill="#FFFFFF">ResNet-18</text>
    <text x="490" y="282" text-anchor="middle" font-size="12" fill="#FFFFFF">11.7M params</text>
  </g>
  <g>
    <rect x="670" y="195" width="180" height="110" rx="8" fill="#7BA7D9"/>
    <text x="760" y="240" text-anchor="middle" font-size="15" font-weight="600" fill="#FFFFFF">Pooling</text>
    <text x="760" y="262" text-anchor="middle" font-size="12" fill="#FFFFFF">global avg</text>
    <text x="760" y="282" text-anchor="middle" font-size="12" fill="#FFFFFF">→ 512-D vec</text>
  </g>
  <g>
    <rect x="940" y="195" width="180" height="110" rx="8" fill="#7BA7D9"/>
    <text x="1030" y="240" text-anchor="middle" font-size="15" font-weight="600" fill="#FFFFFF">FC + softmax</text>
    <text x="1030" y="262" text-anchor="middle" font-size="12" fill="#FFFFFF">512 → 18 classes</text>
  </g>
  <g>
    <rect x="1210" y="195" width="220" height="110" rx="8" fill="#7BA7D9"/>
    <text x="1320" y="240" text-anchor="middle" font-size="15" font-weight="600" fill="#FFFFFF">Output: ŷ</text>
    <text x="1320" y="262" text-anchor="middle" font-size="12" fill="#FFFFFF">cross-entropy loss</text>
    <text x="1320" y="282" text-anchor="middle" font-size="12" fill="#FFFFFF">accuracy = 78.2%</text>
  </g>

  <g stroke="#6B7280" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <line x1="312" y1="250" x2="398" y2="250"/>
    <line x1="582" y1="250" x2="668" y2="250"/>
    <line x1="852" y1="250" x2="938" y2="250"/>
    <line x1="1122" y1="250" x2="1208" y2="250"/>
  </g>

  <!-- ===== BOTTOM TRACK BAND (Proposed) ===== -->
  <rect x="60" y="430" width="1480" height="240" rx="14"
        fill="#D6EBD6" stroke="#88C088" stroke-width="2"/>
  <text x="90" y="462" font-size="18" font-weight="bold" fill="#1F2937">
    Proposed Method  <tspan fill="#16A34A" font-style="italic">(ours)</tspan>
  </text>
  <text x="90" y="483" font-size="12" fill="#6B7280" font-style="italic">
    backbone + auxiliary head
  </text>

  <!-- bottom track modules (mostly same positions to make comparison obvious) -->
  <g>
    <rect x="130" y="515" width="180" height="110" rx="8" fill="#88C088"/>
    <text x="220" y="560" text-anchor="middle" font-size="15" font-weight="600" fill="#FFFFFF">Input</text>
    <text x="220" y="582" text-anchor="middle" font-size="12" fill="#FFFFFF">64 × 64 grayscale</text>
    <text x="220" y="602" text-anchor="middle" font-size="12" fill="#FFFFFF">+ augmentation</text>
  </g>
  <g>
    <rect x="400" y="515" width="180" height="110" rx="8" fill="#88C088"/>
    <text x="490" y="560" text-anchor="middle" font-size="15" font-weight="600" fill="#FFFFFF">CNN backbone</text>
    <text x="490" y="582" text-anchor="middle" font-size="12" fill="#FFFFFF">ResNet-18</text>
    <text x="490" y="602" text-anchor="middle" font-size="12" fill="#FFFFFF">shared weights</text>
  </g>
  <g>
    <rect x="670" y="515" width="180" height="110" rx="8" fill="#88C088"/>
    <text x="760" y="560" text-anchor="middle" font-size="15" font-weight="600" fill="#FFFFFF">Dual heads</text>
    <text x="760" y="582" text-anchor="middle" font-size="12" fill="#FFFFFF">main + auxiliary</text>
    <text x="760" y="602" text-anchor="middle" font-size="12" fill="#FFFFFF">contrastive proj.</text>
  </g>
  <g>
    <rect x="940" y="515" width="180" height="110" rx="8" fill="#88C088"/>
    <text x="1030" y="560" text-anchor="middle" font-size="15" font-weight="600" fill="#FFFFFF">FC + uncertainty</text>
    <text x="1030" y="582" text-anchor="middle" font-size="12" fill="#FFFFFF">μ, log σ²</text>
  </g>
  <g>
    <rect x="1210" y="515" width="220" height="110" rx="8" fill="#88C088"/>
    <text x="1320" y="560" text-anchor="middle" font-size="15" font-weight="600" fill="#FFFFFF">Output: ŷ ± δ</text>
    <text x="1320" y="582" text-anchor="middle" font-size="12" fill="#FFFFFF">CE + NCE loss</text>
    <text x="1320" y="602" text-anchor="middle" font-size="12" fill="#FFFFFF">accuracy = 91.4%</text>
  </g>

  <g stroke="#6B7280" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <line x1="312" y1="570" x2="398" y2="570"/>
    <line x1="582" y1="570" x2="668" y2="570"/>
    <line x1="852" y1="570" x2="938" y2="570"/>
    <line x1="1122" y1="570" x2="1208" y2="570"/>
  </g>

  <!-- ===== Cross-track connections (where the two pipelines share / differ) ===== -->
  <!-- shared input source: both tracks read from the same dataset -->
  <g stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6,4" fill="none">
    <line x1="220" y1="305" x2="220" y2="515" marker-end="url(#arrow_cross)"/>
  </g>
  <text x="65" y="410" font-size="11" font-style="italic" fill="#6B7280">
    shared
  </text>
  <text x="65" y="425" font-size="11" font-style="italic" fill="#6B7280">
    inputs
  </text>

  <!-- shared backbone: weights are tied between baseline and ours -->
  <g stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6,4" fill="none">
    <line x1="490" y1="305" x2="490" y2="515" marker-end="url(#arrow_cross)"/>
  </g>
  <text x="495" y="412" font-size="11" font-style="italic" fill="#6B7280">
    shared weights
  </text>

  <!-- final results comparison -->
  <g stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6,4" fill="none">
    <line x1="1320" y1="515" x2="1320" y2="305" marker-end="url(#arrow_cross)"/>
  </g>
  <text x="1340" y="412" font-size="11" font-style="italic" fill="#6B7280">
    +13.2%  ↑
  </text>

  <!-- ===== Bottom result summary ===== -->
  <g>
    <rect x="60" y="710" width="1480" height="70" rx="10"
          fill="#FFFFFF" stroke="#D1D5DB" stroke-width="1.5"/>
    <text x="800" y="740" text-anchor="middle" font-size="15" font-weight="bold" fill="#1F2937">
      Net improvement: +13.2% accuracy · +0.18 macro-F1 · uncertainty-calibrated outputs
    </text>
    <text x="800" y="763" text-anchor="middle" font-size="12" fill="#6B7280" font-style="italic">
      Identical training budget, identical backbone — gains attributable to the auxiliary objective.
    </text>
  </g>
</svg>
