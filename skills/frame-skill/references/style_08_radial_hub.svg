<?xml version="1.0" encoding="UTF-8"?>
<!--
  STYLE 08 · RADIAL / HUB-AND-SPOKE
  Pattern: one central concept, satellite nodes arranged on a circle around it,
           connectors radiate from hub to each satellite.
  Use for: "our method has N key contributions", a core engine with N supporting
           modules, a concept and its N facets, capability overviews.
  Palette: Pastel Academic. Font: Times New Roman + CJK.

  Coordinate system: 1200 x 1100 viewBox.
  Geometry: hub centred at (600, 560), r=140. Six satellites on a circle of
            radius 360, at 60-degree spacing starting from the top (-90 deg).
            Satellite positions (precomputed):
              top        ( 600, 200)
              top-right  ( 912, 380)
              bot-right  ( 912, 740)
              bottom     ( 600, 920)
              bot-left   ( 288, 740)
              top-left   ( 288, 380)
  Each satellite is a 260 x 150 rounded rect, centred on its point.
  Connectors are straight lines hub-edge -> satellite-edge.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1100"
     font-family="'Noto Sans CJK SC', 'SimHei', 'Times New Roman', serif">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6B7280"/>
    </marker>
  </defs>

  <text x="600" y="55" text-anchor="middle" font-size="26" font-weight="bold" fill="#1F2937">
    框架核心与关键贡献 Core Framework &amp; Key Contributions
  </text>
  <text x="600" y="84" text-anchor="middle" font-size="14" fill="#6B7280" font-style="italic">
    one unified model — six functional modules organised around it
  </text>

  <!-- ===== CONNECTORS (drawn first so nodes sit on top) ===== -->
  <g stroke="#6B7280" stroke-width="2.2" fill="none" marker-end="url(#arrow)">
    <!-- hub -> top -->
    <line x1="600" y1="420" x2="600" y2="278"/>
    <!-- hub -> top-right -->
    <line x1="710" y1="475" x2="838" y2="408"/>
    <!-- hub -> bot-right -->
    <line x1="710" y1="645" x2="838" y2="712"/>
    <!-- hub -> bottom -->
    <line x1="600" y1="700" x2="600" y2="842"/>
    <!-- hub -> bot-left -->
    <line x1="490" y1="645" x2="362" y2="712"/>
    <!-- hub -> top-left -->
    <line x1="490" y1="475" x2="362" y2="408"/>
  </g>

  <!-- ===== HUB (centre) ===== -->
  <circle cx="600" cy="560" r="140"
          fill="#E5D9F2" stroke="#8B6CB8" stroke-width="3"/>
  <circle cx="600" cy="560" r="118"
          fill="#B197D6" stroke="none"/>
  <text x="600" y="548" text-anchor="middle" font-size="22" font-weight="bold" fill="#FFFFFF">
    Unified
  </text>
  <text x="600" y="578" text-anchor="middle" font-size="22" font-weight="bold" fill="#FFFFFF">
    Framework
  </text>
  <text x="600" y="606" text-anchor="middle" font-size="13" fill="#FFFFFF" font-style="italic">
    单一端到端模型
  </text>

  <!-- ===== SATELLITE 1: TOP ===== -->
  <g>
    <rect x="470" y="125" width="260" height="150" rx="12"
          fill="#DCE7F5" stroke="#7BA7D9" stroke-width="2.5"/>
    <circle cx="505" cy="160" r="18" fill="#7BA7D9"/>
    <text x="505" y="166" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">1</text>
    <text x="600" y="166" text-anchor="middle" font-size="16" font-weight="bold" fill="#1F2937">数据编码 Encoder</text>
    <text x="600" y="200" text-anchor="middle" font-size="12" fill="#4B5563">multi-modal input fusion</text>
    <text x="600" y="222" text-anchor="middle" font-size="12" fill="#4B5563">shared embedding space</text>
    <text x="600" y="248" text-anchor="middle" font-size="11" fill="#6B7280" font-style="italic">handles image + text + tabular</text>
  </g>

  <!-- ===== SATELLITE 2: TOP-RIGHT ===== -->
  <g>
    <rect x="782" y="305" width="260" height="150" rx="12"
          fill="#D6EBD6" stroke="#88C088" stroke-width="2.5"/>
    <circle cx="817" cy="340" r="18" fill="#88C088"/>
    <text x="817" y="346" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">2</text>
    <text x="912" y="346" text-anchor="middle" font-size="16" font-weight="bold" fill="#1F2937">特征处理 Backbone</text>
    <text x="912" y="380" text-anchor="middle" font-size="12" fill="#4B5563">hierarchical feature maps</text>
    <text x="912" y="402" text-anchor="middle" font-size="12" fill="#4B5563">residual + attention</text>
    <text x="912" y="428" text-anchor="middle" font-size="11" fill="#6B7280" font-style="italic">38-layer, 12.6M params</text>
  </g>

  <!-- ===== SATELLITE 3: BOTTOM-RIGHT ===== -->
  <g>
    <rect x="782" y="665" width="260" height="150" rx="12"
          fill="#FFE0CC" stroke="#F0A776" stroke-width="2.5"/>
    <circle cx="817" cy="700" r="18" fill="#F0A776"/>
    <text x="817" y="706" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">3</text>
    <text x="912" y="706" text-anchor="middle" font-size="16" font-weight="bold" fill="#1F2937">不确定性 Uncertainty</text>
    <text x="912" y="740" text-anchor="middle" font-size="12" fill="#4B5563">predictive μ and log σ²</text>
    <text x="912" y="762" text-anchor="middle" font-size="12" fill="#4B5563">calibrated confidence</text>
    <text x="912" y="788" text-anchor="middle" font-size="11" fill="#6B7280" font-style="italic">aux. regression head</text>
  </g>

  <!-- ===== SATELLITE 4: BOTTOM ===== -->
  <g>
    <rect x="470" y="845" width="260" height="150" rx="12"
          fill="#FAD6D6" stroke="#E89090" stroke-width="2.5"/>
    <circle cx="505" cy="880" r="18" fill="#E89090"/>
    <text x="505" y="886" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">4</text>
    <text x="600" y="886" text-anchor="middle" font-size="16" font-weight="bold" fill="#1F2937">正则化 Regularizer</text>
    <text x="600" y="920" text-anchor="middle" font-size="12" fill="#4B5563">dropout + weight decay</text>
    <text x="600" y="942" text-anchor="middle" font-size="12" fill="#4B5563">contrastive consistency</text>
    <text x="600" y="968" text-anchor="middle" font-size="11" fill="#6B7280" font-style="italic">prevents overfitting</text>
  </g>

  <!-- ===== SATELLITE 5: BOTTOM-LEFT ===== -->
  <g>
    <rect x="158" y="665" width="260" height="150" rx="12"
          fill="#DCE7F5" stroke="#7BA7D9" stroke-width="2.5"/>
    <circle cx="193" cy="700" r="18" fill="#7BA7D9"/>
    <text x="193" y="706" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">5</text>
    <text x="288" y="706" text-anchor="middle" font-size="16" font-weight="bold" fill="#1F2937">解码输出 Decoder</text>
    <text x="288" y="740" text-anchor="middle" font-size="12" fill="#4B5563">task-specific heads</text>
    <text x="288" y="762" text-anchor="middle" font-size="12" fill="#4B5563">classification + regression</text>
    <text x="288" y="788" text-anchor="middle" font-size="11" fill="#6B7280" font-style="italic">18-way + scalar output</text>
  </g>

  <!-- ===== SATELLITE 6: TOP-LEFT ===== -->
  <g>
    <rect x="158" y="305" width="260" height="150" rx="12"
          fill="#D6EBD6" stroke="#88C088" stroke-width="2.5"/>
    <circle cx="193" cy="340" r="18" fill="#88C088"/>
    <text x="193" y="346" text-anchor="middle" font-size="15" font-weight="bold" fill="#FFFFFF">6</text>
    <text x="288" y="346" text-anchor="middle" font-size="16" font-weight="bold" fill="#1F2937">训练策略 Trainer</text>
    <text x="288" y="380" text-anchor="middle" font-size="12" fill="#4B5563">Adam, cosine schedule</text>
    <text x="288" y="402" text-anchor="middle" font-size="12" fill="#4B5563">mixed-precision</text>
    <text x="288" y="428" text-anchor="middle" font-size="11" fill="#6B7280" font-style="italic">200 epochs, early stop</text>
  </g>

  <!-- ===== Footnote ===== -->
  <text x="600" y="1060" text-anchor="middle" font-size="13" fill="#6B7280" font-style="italic">
    所有模块共享同一表示空间 — All six modules operate on the shared latent representation.
  </text>
</svg>
