<?xml version="1.0" encoding="UTF-8"?>
<!--
  STYLE 02 · HORIZONTAL PIPELINE
  Pattern: single horizontal flow, modules in a row with arrows between them.
  Use for: linear algorithms, simple data pipelines, "X → Y → Z" workflows, experimental procedures.
  Palette: Pastel Academic. Font: Times New Roman + CJK.

  Coordinate system: 1600 x 600 viewBox.
  Each module: 200 wide, 140 tall. Gap between modules: 60 (room for arrow + label).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600"
     font-family="'Times New Roman', 'Noto Sans CJK SC', 'SimHei', serif">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6B7280"/>
    </marker>
    <marker id="arrow_dash" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <!-- title at top (optional, often omitted in a figure-caption-driven journal) -->
  <text x="800" y="55" text-anchor="middle" font-size="26" font-weight="bold" fill="#1F2937">
    End-to-End Processing Pipeline
  </text>
  <text x="800" y="82" text-anchor="middle" font-size="14" fill="#6B7280" font-style="italic">
    raw input → cleaned data → trained model → predictions
  </text>

  <!-- ===== STAGE 1: DATA COLLECTION ===== -->
  <g>
    <rect x="60" y="200" width="220" height="160" rx="14"
          fill="#DCE7F5" stroke="#7BA7D9" stroke-width="2.5"/>
    <!-- step number badge -->
    <circle cx="90" cy="230" r="20" fill="#7BA7D9"/>
    <text x="90" y="237" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">1</text>
    <text x="170" y="237" text-anchor="middle" font-size="17" font-weight="bold" fill="#1F2937">
      Data Collection
    </text>
    <line x1="80" y1="260" x2="260" y2="260" stroke="#7BA7D9" stroke-width="1" opacity="0.5"/>
    <text x="170" y="290" text-anchor="middle" font-size="13" fill="#1F2937">Raw measurements</text>
    <text x="170" y="312" text-anchor="middle" font-size="13" fill="#1F2937">from N = 1,200</text>
    <text x="170" y="334" text-anchor="middle" font-size="13" fill="#1F2937">samples</text>
  </g>

  <!-- ===== STAGE 2: PREPROCESSING ===== -->
  <g>
    <rect x="350" y="200" width="220" height="160" rx="14"
          fill="#D6EBD6" stroke="#88C088" stroke-width="2.5"/>
    <circle cx="380" cy="230" r="20" fill="#88C088"/>
    <text x="380" y="237" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">2</text>
    <text x="460" y="237" text-anchor="middle" font-size="17" font-weight="bold" fill="#1F2937">
      Preprocessing
    </text>
    <line x1="370" y1="260" x2="550" y2="260" stroke="#88C088" stroke-width="1" opacity="0.5"/>
    <text x="460" y="290" text-anchor="middle" font-size="13" fill="#1F2937">• outlier removal</text>
    <text x="460" y="312" text-anchor="middle" font-size="13" fill="#1F2937">• normalization</text>
    <text x="460" y="334" text-anchor="middle" font-size="13" fill="#1F2937">• splitting (80/20)</text>
  </g>

  <!-- ===== STAGE 3: MODEL TRAINING ===== -->
  <g>
    <rect x="640" y="200" width="220" height="160" rx="14"
          fill="#FFE0CC" stroke="#F0A776" stroke-width="2.5"/>
    <circle cx="670" cy="230" r="20" fill="#F0A776"/>
    <text x="670" y="237" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">3</text>
    <text x="755" y="237" text-anchor="middle" font-size="17" font-weight="bold" fill="#1F2937">
      Model Training
    </text>
    <line x1="660" y1="260" x2="840" y2="260" stroke="#F0A776" stroke-width="1" opacity="0.5"/>
    <text x="750" y="290" text-anchor="middle" font-size="13" fill="#1F2937">ResNet-38</text>
    <text x="750" y="312" text-anchor="middle" font-size="13" fill="#1F2937">Adam, lr = 1e-4</text>
    <text x="750" y="334" text-anchor="middle" font-size="13" fill="#1F2937">200 epochs</text>
  </g>

  <!-- ===== STAGE 4: EVALUATION ===== -->
  <g>
    <rect x="930" y="200" width="220" height="160" rx="14"
          fill="#E5D9F2" stroke="#B197D6" stroke-width="2.5"/>
    <circle cx="960" cy="230" r="20" fill="#B197D6"/>
    <text x="960" y="237" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">4</text>
    <text x="1045" y="237" text-anchor="middle" font-size="17" font-weight="bold" fill="#1F2937">
      Evaluation
    </text>
    <line x1="950" y1="260" x2="1130" y2="260" stroke="#B197D6" stroke-width="1" opacity="0.5"/>
    <text x="1040" y="290" text-anchor="middle" font-size="13" fill="#1F2937">Test set inference</text>
    <text x="1040" y="312" text-anchor="middle" font-size="13" fill="#1F2937">RMSE, R², fidelity</text>
    <text x="1040" y="334" text-anchor="middle" font-size="13" fill="#1F2937">on N = 240 held-out</text>
  </g>

  <!-- ===== STAGE 5: DEPLOYMENT ===== -->
  <g>
    <rect x="1220" y="200" width="220" height="160" rx="14"
          fill="#FAD6D6" stroke="#E89090" stroke-width="2.5"/>
    <circle cx="1250" cy="230" r="20" fill="#E89090"/>
    <text x="1250" y="237" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">5</text>
    <text x="1335" y="237" text-anchor="middle" font-size="17" font-weight="bold" fill="#1F2937">
      Deployment
    </text>
    <line x1="1240" y1="260" x2="1420" y2="260" stroke="#E89090" stroke-width="1" opacity="0.5"/>
    <text x="1330" y="290" text-anchor="middle" font-size="13" fill="#1F2937">Inference API</text>
    <text x="1330" y="312" text-anchor="middle" font-size="13" fill="#1F2937">8 ms / sample</text>
    <text x="1330" y="334" text-anchor="middle" font-size="13" fill="#1F2937">on edge device</text>
  </g>

  <!-- ===== Arrows between stages with labels ===== -->
  <g stroke="#6B7280" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <line x1="282" y1="280" x2="345" y2="280"/>
    <line x1="572" y1="280" x2="635" y2="280"/>
    <line x1="862" y1="280" x2="925" y2="280"/>
    <line x1="1152" y1="280" x2="1215" y2="280"/>
  </g>
  <!-- arrow micro-labels -->
  <text x="313" y="273" text-anchor="middle" font-size="11" fill="#6B7280" font-style="italic">raw</text>
  <text x="603" y="273" text-anchor="middle" font-size="11" fill="#6B7280" font-style="italic">cleaned</text>
  <text x="893" y="273" text-anchor="middle" font-size="11" fill="#6B7280" font-style="italic">model</text>
  <text x="1183" y="273" text-anchor="middle" font-size="11" fill="#6B7280" font-style="italic">metrics</text>

  <!-- ===== Optional: validation feedback (a curve back from eval to training) ===== -->
  <path d="M 1040 360 Q 1040 460 750 460 Q 750 460 750 372"
        fill="none" stroke="#9CA3AF" stroke-width="2"
        stroke-dasharray="6,4" marker-end="url(#arrow_dash)"/>
  <text x="895" y="478" text-anchor="middle" font-size="13" fill="#6B7280" font-style="italic">
    validation feedback (hyperparameter tuning)
  </text>

  <!-- ===== Bottom annotation row ===== -->
  <g>
    <text x="60" y="540" font-size="13" fill="#6B7280">
      Total runtime: 4.2 hours on a single NVIDIA RTX 4090.
    </text>
    <text x="60" y="562" font-size="13" fill="#6B7280">
      Code &amp; data: github.com/example/repo (DOI: 10.xxxx/xxxxx)
    </text>
  </g>

</svg>
