<?xml version="1.0" encoding="UTF-8"?>
<!--
  Machine Learning Workflow Diagram
  Style: Horizontal Pipeline (Style 02) + Cycle Feedback (Style 05)
  Palette: Pastel Academic (Palette 1)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900"
     font-family="'Noto Serif CJK SC', 'Times New Roman', 'Noto Sans CJK SC', 'SimHei', serif">

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6B7280"/>
    </marker>
    <marker id="arrow_dash" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <!-- ===== Title ===== -->
  <text x="800" y="50" text-anchor="middle" font-size="30" font-weight="bold" fill="#1F2937">
    机器学习工作流程 Machine Learning Workflow
  </text>
  <text x="800" y="80" text-anchor="middle" font-size="15" fill="#6B7280" font-style="italic">
    从原始数据到模型部署的端到端流程  ·  raw data → preprocessing → training → evaluation → deployment
  </text>

  <!-- ============================================ -->
  <!-- TOP ROW: 6 main pipeline stages              -->
  <!-- ============================================ -->

  <!-- ===== STAGE 1: 数据采集 Data Collection ===== -->
  <g>
    <rect x="40" y="170" width="230" height="180" rx="14"
          fill="#DCE7F5" stroke="#7BA7D9" stroke-width="2.5"/>
    <circle cx="70" cy="200" r="20" fill="#7BA7D9"/>
    <text x="70" y="207" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">1</text>
    <text x="170" y="207" text-anchor="middle" font-size="16" font-weight="bold" fill="#1F2937">
      数据采集
    </text>
    <text x="170" y="226" text-anchor="middle" font-size="13" font-weight="bold" fill="#1F2937">
      Data Collection
    </text>
    <line x1="60" y1="245" x2="250" y2="245" stroke="#7BA7D9" stroke-width="1" opacity="0.5"/>
    <text x="155" y="270" text-anchor="middle" font-size="12" fill="#1F2937">• 数据库 / Database</text>
    <text x="155" y="290" text-anchor="middle" font-size="12" fill="#1F2937">• 传感器 / Sensors</text>
    <text x="155" y="310" text-anchor="middle" font-size="12" fill="#1F2937">• 网络爬取 / Web</text>
    <text x="155" y="330" text-anchor="middle" font-size="12" fill="#1F2937">• 公开数据集</text>
  </g>

  <!-- ===== STAGE 2: 数据预处理 Preprocessing ===== -->
  <g>
    <rect x="305" y="170" width="230" height="180" rx="14"
          fill="#D6EBD6" stroke="#88C088" stroke-width="2.5"/>
    <circle cx="335" cy="200" r="20" fill="#88C088"/>
    <text x="335" y="207" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">2</text>
    <text x="435" y="207" text-anchor="middle" font-size="16" font-weight="bold" fill="#1F2937">
      数据预处理
    </text>
    <text x="435" y="226" text-anchor="middle" font-size="13" font-weight="bold" fill="#1F2937">
      Preprocessing
    </text>
    <line x1="325" y1="245" x2="515" y2="245" stroke="#88C088" stroke-width="1" opacity="0.5"/>
    <text x="420" y="270" text-anchor="middle" font-size="12" fill="#1F2937">• 缺失值处理</text>
    <text x="420" y="290" text-anchor="middle" font-size="12" fill="#1F2937">• 异常值剔除</text>
    <text x="420" y="310" text-anchor="middle" font-size="12" fill="#1F2937">• 归一化 / Normalize</text>
    <text x="420" y="330" text-anchor="middle" font-size="12" fill="#1F2937">• 数据划分 (训练/测试)</text>
  </g>

  <!-- ===== STAGE 3: 特征工程 Feature Engineering ===== -->
  <g>
    <rect x="570" y="170" width="230" height="180" rx="14"
          fill="#FFE0CC" stroke="#F0A776" stroke-width="2.5"/>
    <circle cx="600" cy="200" r="20" fill="#F0A776"/>
    <text x="600" y="207" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">3</text>
    <text x="700" y="207" text-anchor="middle" font-size="16" font-weight="bold" fill="#1F2937">
      特征工程
    </text>
    <text x="700" y="226" text-anchor="middle" font-size="13" font-weight="bold" fill="#1F2937">
      Feature Engineering
    </text>
    <line x1="590" y1="245" x2="780" y2="245" stroke="#F0A776" stroke-width="1" opacity="0.5"/>
    <text x="685" y="270" text-anchor="middle" font-size="12" fill="#1F2937">• 特征选择 / Selection</text>
    <text x="685" y="290" text-anchor="middle" font-size="12" fill="#1F2937">• 特征提取 / Extraction</text>
    <text x="685" y="310" text-anchor="middle" font-size="12" fill="#1F2937">• 编码 (One-Hot)</text>
    <text x="685" y="330" text-anchor="middle" font-size="12" fill="#1F2937">• 降维 (PCA)</text>
  </g>

  <!-- ===== STAGE 4: 模型训练 Model Training ===== -->
  <g>
    <rect x="835" y="170" width="230" height="180" rx="14"
          fill="#FAD6D6" stroke="#E89090" stroke-width="2.5"/>
    <circle cx="865" cy="200" r="20" fill="#E89090"/>
    <text x="865" y="207" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">4</text>
    <text x="965" y="207" text-anchor="middle" font-size="16" font-weight="bold" fill="#1F2937">
      模型训练
    </text>
    <text x="965" y="226" text-anchor="middle" font-size="13" font-weight="bold" fill="#1F2937">
      Model Training
    </text>
    <line x1="855" y1="245" x2="1045" y2="245" stroke="#E89090" stroke-width="1" opacity="0.5"/>
    <text x="950" y="270" text-anchor="middle" font-size="12" fill="#1F2937">• 算法选择</text>
    <text x="950" y="290" text-anchor="middle" font-size="12" fill="#1F2937">• 损失函数 / Loss</text>
    <text x="950" y="310" text-anchor="middle" font-size="12" fill="#1F2937">• 反向传播 / Backprop</text>
    <text x="950" y="330" text-anchor="middle" font-size="12" fill="#1F2937">• 参数优化 / Optimizer</text>
  </g>

  <!-- ===== STAGE 5: 模型评估 Evaluation ===== -->
  <g>
    <rect x="1100" y="170" width="230" height="180" rx="14"
          fill="#E5D9F2" stroke="#B197D6" stroke-width="2.5"/>
    <circle cx="1130" cy="200" r="20" fill="#B197D6"/>
    <text x="1130" y="207" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">5</text>
    <text x="1230" y="207" text-anchor="middle" font-size="16" font-weight="bold" fill="#1F2937">
      模型评估
    </text>
    <text x="1230" y="226" text-anchor="middle" font-size="13" font-weight="bold" fill="#1F2937">
      Evaluation
    </text>
    <line x1="1120" y1="245" x2="1310" y2="245" stroke="#B197D6" stroke-width="1" opacity="0.5"/>
    <text x="1215" y="270" text-anchor="middle" font-size="12" fill="#1F2937">• 准确率 / Accuracy</text>
    <text x="1215" y="290" text-anchor="middle" font-size="12" fill="#1F2937">• 精度 / 召回率</text>
    <text x="1215" y="310" text-anchor="middle" font-size="12" fill="#1F2937">• F1-Score, AUC</text>
    <text x="1215" y="330" text-anchor="middle" font-size="12" fill="#1F2937">• 交叉验证 / CV</text>
  </g>

  <!-- ===== STAGE 6: 模型部署 Deployment ===== -->
  <g>
    <rect x="1365" y="170" width="200" height="180" rx="14"
          fill="#DCE7F5" stroke="#7BA7D9" stroke-width="2.5"/>
    <circle cx="1395" cy="200" r="20" fill="#7BA7D9"/>
    <text x="1395" y="207" text-anchor="middle" font-size="18" font-weight="bold" fill="#FFFFFF">6</text>
    <text x="1480" y="207" text-anchor="middle" font-size="16" font-weight="bold" fill="#1F2937">
      模型部署
    </text>
    <text x="1480" y="226" text-anchor="middle" font-size="13" font-weight="bold" fill="#1F2937">
      Deployment
    </text>
    <line x1="1385" y1="245" x2="1545" y2="245" stroke="#7BA7D9" stroke-width="1" opacity="0.5"/>
    <text x="1465" y="270" text-anchor="middle" font-size="12" fill="#1F2937">• API 服务</text>
    <text x="1465" y="290" text-anchor="middle" font-size="12" fill="#1F2937">• 边缘部署 / Edge</text>
    <text x="1465" y="310" text-anchor="middle" font-size="12" fill="#1F2937">• 实时推理</text>
    <text x="1465" y="330" text-anchor="middle" font-size="12" fill="#1F2937">• 监控 / Monitoring</text>
  </g>

  <!-- ===== Arrows between top-row stages ===== -->
  <g stroke="#6B7280" stroke-width="2.5" fill="none" marker-end="url(#arrow)">
    <line x1="272" y1="260" x2="302" y2="260"/>
    <line x1="537" y1="260" x2="567" y2="260"/>
    <line x1="802" y1="260" x2="832" y2="260"/>
    <line x1="1067" y1="260" x2="1097" y2="260"/>
    <line x1="1332" y1="260" x2="1362" y2="260"/>
  </g>
  <!-- micro-labels above arrows -->
  <text x="287" y="252" text-anchor="middle" font-size="10" fill="#6B7280" font-style="italic">raw</text>
  <text x="552" y="252" text-anchor="middle" font-size="10" fill="#6B7280" font-style="italic">clean</text>
  <text x="817" y="252" text-anchor="middle" font-size="10" fill="#6B7280" font-style="italic">features</text>
  <text x="1082" y="252" text-anchor="middle" font-size="10" fill="#6B7280" font-style="italic">model</text>
  <text x="1347" y="252" text-anchor="middle" font-size="10" fill="#6B7280" font-style="italic">deploy</text>

  <!-- ============================================ -->
  <!-- BOTTOM ROW: Detail blocks under key stages   -->
  <!-- ============================================ -->

  <!-- Container: 学习范式 Learning Paradigms (under Training) -->
  <g>
    <rect x="40" y="450" width="760" height="220" rx="14"
          fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="60" y="478" font-size="16" font-weight="bold" fill="#1F2937">
      学习范式 Learning Paradigms
    </text>
    <text x="60" y="497" font-size="12" fill="#6B7280" font-style="italic">
      在「模型训练」阶段所采用的核心学习方式
    </text>

    <!-- Supervised -->
    <rect x="65" y="515" width="220" height="135" rx="8"
          fill="#88C088" stroke="#88C088" stroke-width="1.5"/>
    <text x="175" y="542" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">
      监督学习
    </text>
    <text x="175" y="560" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">
      Supervised Learning
    </text>
    <line x1="85" y1="572" x2="265" y2="572" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
    <text x="175" y="592" text-anchor="middle" font-size="11" fill="#FFFFFF">输入 + 标签 (X, y)</text>
    <text x="175" y="612" text-anchor="middle" font-size="11" fill="#FFFFFF">分类 / 回归</text>
    <text x="175" y="632" text-anchor="middle" font-size="11" fill="#FFFFFF">SVM, Tree, CNN</text>

    <!-- Unsupervised -->
    <rect x="305" y="515" width="220" height="135" rx="8"
          fill="#F0A776" stroke="#F0A776" stroke-width="1.5"/>
    <text x="415" y="542" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">
      无监督学习
    </text>
    <text x="415" y="560" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">
      Unsupervised
    </text>
    <line x1="325" y1="572" x2="505" y2="572" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
    <text x="415" y="592" text-anchor="middle" font-size="11" fill="#FFFFFF">仅输入 X，无标签</text>
    <text x="415" y="612" text-anchor="middle" font-size="11" fill="#FFFFFF">聚类 / 降维</text>
    <text x="415" y="632" text-anchor="middle" font-size="11" fill="#FFFFFF">K-Means, PCA</text>

    <!-- Reinforcement -->
    <rect x="545" y="515" width="230" height="135" rx="8"
          fill="#B197D6" stroke="#B197D6" stroke-width="1.5"/>
    <text x="660" y="542" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">
      强化学习
    </text>
    <text x="660" y="560" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">
      Reinforcement Learning
    </text>
    <line x1="565" y1="572" x2="755" y2="572" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
    <text x="660" y="592" text-anchor="middle" font-size="11" fill="#FFFFFF">智能体 ↔ 环境</text>
    <text x="660" y="612" text-anchor="middle" font-size="11" fill="#FFFFFF">奖励驱动 / Reward</text>
    <text x="660" y="632" text-anchor="middle" font-size="11" fill="#FFFFFF">Q-Learning, PPO</text>
  </g>

  <!-- Container: 评估细节 Evaluation Loop (under Eval+Deploy) -->
  <g>
    <rect x="830" y="450" width="735" height="220" rx="14"
          fill="#FFFFFF" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="4,3"/>
    <text x="850" y="478" font-size="16" font-weight="bold" fill="#1F2937">
      训练-评估迭代循环 Train-Evaluate Loop
    </text>
    <text x="850" y="497" font-size="12" fill="#6B7280" font-style="italic">
      根据评估结果回流到训练阶段，持续优化模型表现
    </text>

    <!-- Sub-block: 拟合状态 -->
    <rect x="855" y="515" width="210" height="135" rx="8"
          fill="#E89090" stroke="#E89090" stroke-width="1.5"/>
    <text x="960" y="542" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">
      拟合诊断
    </text>
    <text x="960" y="560" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">
      Fitting Diagnosis
    </text>
    <line x1="875" y1="572" x2="1045" y2="572" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
    <text x="960" y="592" text-anchor="middle" font-size="11" fill="#FFFFFF">欠拟合 Underfit</text>
    <text x="960" y="612" text-anchor="middle" font-size="11" fill="#FFFFFF">过拟合 Overfit</text>
    <text x="960" y="632" text-anchor="middle" font-size="11" fill="#FFFFFF">偏差-方差权衡</text>

    <!-- Sub-block: 超参调优 -->
    <rect x="1085" y="515" width="210" height="135" rx="8"
          fill="#7BA7D9" stroke="#7BA7D9" stroke-width="1.5"/>
    <text x="1190" y="542" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">
      超参数调优
    </text>
    <text x="1190" y="560" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">
      Hyperparameter Tuning
    </text>
    <line x1="1105" y1="572" x2="1275" y2="572" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
    <text x="1190" y="592" text-anchor="middle" font-size="11" fill="#FFFFFF">网格搜索 Grid</text>
    <text x="1190" y="612" text-anchor="middle" font-size="11" fill="#FFFFFF">贝叶斯优化 Bayesian</text>
    <text x="1190" y="632" text-anchor="middle" font-size="11" fill="#FFFFFF">学习率 / 正则化</text>

    <!-- Sub-block: 持续监控 -->
    <rect x="1315" y="515" width="230" height="135" rx="8"
          fill="#9CA3AF" stroke="#6B7280" stroke-width="1.5"/>
    <text x="1430" y="542" text-anchor="middle" font-size="14" font-weight="bold" fill="#FFFFFF">
      持续监控
    </text>
    <text x="1430" y="560" text-anchor="middle" font-size="12" font-weight="bold" fill="#FFFFFF">
      Continuous Monitoring
    </text>
    <line x1="1335" y1="572" x2="1525" y2="572" stroke="#FFFFFF" stroke-width="1" opacity="0.6"/>
    <text x="1430" y="592" text-anchor="middle" font-size="11" fill="#FFFFFF">数据漂移检测</text>
    <text x="1430" y="612" text-anchor="middle" font-size="11" fill="#FFFFFF">性能衰减预警</text>
    <text x="1430" y="632" text-anchor="middle" font-size="11" fill="#FFFFFF">A/B Testing</text>
  </g>

  <!-- ===== Connectors from top stages to bottom containers ===== -->
  <!-- Training → Learning Paradigms container -->
  <line x1="950" y1="350" x2="950" y2="380" stroke="#6B7280" stroke-width="2" fill="none"
        marker-end="url(#arrow)" stroke-dasharray="0"/>
  <path d="M 950 380 Q 950 400 700 400 Q 420 400 420 450"
        stroke="#6B7280" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="600" y="395" text-anchor="middle" font-size="11" fill="#6B7280" font-style="italic">
    训练阶段使用 / training uses
  </text>

  <!-- Evaluation → Eval-loop container -->
  <line x1="1215" y1="350" x2="1215" y2="445" stroke="#6B7280" stroke-width="2" fill="none"
        marker-end="url(#arrow)"/>
  <text x="1230" y="400" font-size="11" fill="#6B7280" font-style="italic">
    输出指标 / metrics
  </text>

  <!-- ============================================ -->
  <!-- FEEDBACK LOOPS (dashed)                      -->
  <!-- ============================================ -->

  <!-- Loop 1: Evaluation → Training (hyperparameter tuning) -->
  <path d="M 1190 515 Q 1190 410 950 410 Q 950 410 950 350"
        fill="none" stroke="#9CA3AF" stroke-width="2"
        stroke-dasharray="6,4" marker-end="url(#arrow_dash)"/>
  <text x="1075" y="425" text-anchor="middle" font-size="12" fill="#6B7280" font-style="italic">
    超参反馈 hyperparameter feedback
  </text>

  <!-- Loop 2: Deployment → Data Collection (continuous learning) -->
  <path d="M 1465 350 Q 1465 740 155 740 Q 155 740 155 350"
        fill="none" stroke="#9CA3AF" stroke-width="2.2"
        stroke-dasharray="8,5" marker-end="url(#arrow_dash)"/>
  <text x="810" y="760" text-anchor="middle" font-size="13" fill="#6B7280" font-style="italic">
    新数据回流 · 持续学习 / new data feedback · continuous learning
  </text>

  <!-- ===== Legend (bottom-left) ===== -->
  <g>
    <rect x="40" y="810" width="500" height="70" rx="8"
          fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1.2"/>
    <text x="55" y="833" font-size="13" font-weight="bold" fill="#1F2937">图例 Legend</text>

    <line x1="55" y1="855" x2="95" y2="855" stroke="#6B7280" stroke-width="2.5" marker-end="url(#arrow)"/>
    <text x="105" y="859" font-size="11" fill="#1F2937">主流程 / Main flow</text>

    <line x1="240" y1="855" x2="280" y2="855" stroke="#9CA3AF" stroke-width="2"
          stroke-dasharray="6,4" marker-end="url(#arrow_dash)"/>
    <text x="290" y="859" font-size="11" fill="#1F2937">反馈循环 / Feedback loop</text>
  </g>

  <!-- Bottom annotation -->
  <text x="1560" y="833" text-anchor="end" font-size="12" fill="#6B7280">
    Pastel Academic Palette · Horizontal Pipeline + Cycle Feedback
  </text>
  <text x="1560" y="853" text-anchor="end" font-size="12" fill="#6B7280">
    Figure: General Machine Learning Workflow
  </text>

</svg>
